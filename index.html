<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>📚 Digital Library System</h1>
        <p>Community Public Library Platform</p>
    </header>

    <div id="message-container" class="message" style="display:none;"></div>

    <nav class="tab-navigation">
        <button class="tab-btn active" data-tab="catalogue">📖 Catalogue</button>
        <button class="tab-btn" data-tab="members">👥 Members</button>
        <button class="tab-btn" data-tab="borrow">📋 Borrow</button>
        <button class="tab-btn" data-tab="return">🔄 Return</button>
        <button class="tab-btn" data-tab="add-book">➕ Add Book</button>
        <button class="tab-btn" data-tab="stats">📊 Stats</button>
    </nav>

    <main class="container">

        <!-- CATALOGUE TAB -->
        <div id="tab-catalogue" class="tab-content" style="display:block;">
            <div class="controls">
                <input type="text" id="search-input" placeholder="Search by title, author, or ISBN...">
                <select id="filter-category">
                    <option value="all">All Categories</option>
                </select>
            </div>
            <div id="book-catalogue" class="book-grid"></div>
        </div>

        <!-- MEMBERS TAB -->
        <div id="tab-members" class="tab-content" style="display:none;">
            <h2>Register New Member</h2>
            <form id="member-form" class="form-container">
                <input type="text" id="member-name" placeholder="Full Name" required>
                <input type="email" id="member-email" placeholder="Email Address">
                <label><input type="checkbox" id="member-premium"> Premium Membership</label>
                <button type="submit" class="btn">Register Member</button>
            </form>
            <div id="member-id-display" class="id-display" style="display:none;"></div>
            <h2>Registered Members</h2>
            <div id="members-list"></div>
        </div>

        <!-- BORROW TAB -->
        <div id="tab-borrow" class="tab-content" style="display:none;">
            <h2>Borrow a Book</h2>
            <form id="borrow-form" class="form-container">
                <input type="number" id="borrow-member-id" placeholder="Member ID" required>
                <input type="text" id="borrow-isbn" placeholder="Book ISBN" required>
                <button type="submit" class="btn">Borrow Book</button>
            </form>
        </div>

        <!-- RETURN TAB -->
        <div id="tab-return" class="tab-content" style="display:none;">
            <h2>Return a Book</h2>
            <form id="return-form" class="form-container">
                <input type="number" id="return-member-id" placeholder="Member ID" required>
                <input type="text" id="return-isbn" placeholder="Book ISBN" required>
                <button type="submit" class="btn">Return Book</button>
            </form>
        </div>

        <!-- ADD BOOK TAB -->
        <div id="tab-add-book" class="tab-content" style="display:none;">
            <h2>Add New Book</h2>
            <form id="add-book-form" class="form-container">
                <input type="text" id="add-isbn" placeholder="ISBN" required>
                <input type="text" id="add-title" placeholder="Title" required>
                <input type="text" id="add-author" placeholder="Author" required>
                <input type="number" id="add-year" placeholder="Year" required>
                <input type="number" id="add-copies" placeholder="Copies" value="1" min="1">
                <input type="text" id="add-category" placeholder="Category" value="General">
                <button type="submit" class="btn">Add Book</button>
            </form>
        </div>

        <!-- STATS TAB -->
        <div id="tab-stats" class="tab-content" style="display:none;">
            <h2>Library Statistics</h2>
            <div id="stats-container" class="stats-grid"></div>

            <button id="check-overdue-btn" class="btn">
                Check Overdue Books
            </button>
            <div id="overdue-container"></div>
        </div>

    </main>

    <script type="module" src="src/ui.js"></script>
</body>
</html>
