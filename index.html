<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Library Management System</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="container">

    <header>

      <h1>Digital Library System</h1>

      <nav>

        <button
          id="catalogue-tab"
          type="button"
          data-tab="catalogue"
        >
          Catalogue
        </button>

        <button
          id="members-tab"
          type="button"
          data-tab="members"
        >
          Members
        </button>

        <button
          id="statistics-tab"
          type="button"
          data-tab="statistics"
        >
          Statistics
        </button>

      </nav>

    </header>

    <main>

      <!-- Catalogue Section -->

      <section id="catalogue-section">

        <div class="controls">

          <input
            type="text"
            id="search"
            placeholder="Search books..."
            aria-label="Search books"
          >

          <select
            id="filter-category"
            aria-label="Filter books by category"
          >

            <option value="all">
              All Categories
            </option>

            <option value="fiction">
              Fiction
            </option>

            <option value="non-fiction">
              Non-Fiction
            </option>

            <option value="reference">
              Reference
            </option>

          </select>

        </div>

        <div
          id="catalogue-list"
          class="book-grid"
          data-component="catalogue"
        >

          <!-- Books rendered here -->

        </div>

        <div
          id="book-details"
          data-component="book-details"
        >

          <!-- Selected book details -->

        </div>

      </section>

      <!-- Borrow Section -->

      <section id="borrow-section">

        <h2>Borrow a Book</h2>

        <form id="borrow-form">

          <input
            type="text"
            id="member-id"
            placeholder="Member ID"
            aria-label="Member ID"
            required
          >

          <input
            type="text"
            id="isbn"
            placeholder="ISBN"
            aria-label="ISBN"
            required
          >

          <button type="submit">
            Borrow Book
          </button>

        </form>

      </section>

      <!-- Member Section -->

      <section
        id="member-section"
        style="display: none;"
      >

        <h2>Member Management</h2>

        <form
          id="member-form"
          data-component="member-form"
        >

          <!-- Member form rendered here -->

        </form>

        <div
          id="member-list"
          data-component="members"
        >

          <!-- Members list -->

        </div>

      </section>

      <!-- Statistics Section -->

      <section
        id="statistics-section"
        style="display: none;"
      >

        <h2>Library Statistics</h2>

        <div class="stats-grid">

          <div class="stat-card">

            <h3>Total Books</h3>

            <p class="total-books">
              0
            </p>

          </div>

          <div class="stat-card">

            <h3>Total Members</h3>

            <p class="total-members">
              0
            </p>

          </div>

          <div class="stat-card">

            <h3>Books Borrowed</h3>

            <p class="books-borrowed">
              0
            </p>

          </div>

        </div>

      </section>

    </main>

  </div>

  <!-- Application entry point -->

  <script
    type="module"
    src="./src/ui.js"
  ></script>

</body>

</html>
